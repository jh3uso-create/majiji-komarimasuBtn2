name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ["main"] # もしブランチ名が master の場合は "master" に書き換えてください

  # SettingsのPages画面から手動で実行することもできるようにします
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:https://github.com/majiji-komarimasuBtn2.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Viteが書き出す dist フォルダを指定します

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
